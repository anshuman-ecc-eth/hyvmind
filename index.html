<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <link rel='icon' type='image/png' href='/assets/hyvmind_logo black, transparent-1.png' id='favicon-light' media='(prefers-color-scheme: light)' />
        <link rel='icon' type='image/png' href='/assets/hyvmind_logo white, transparent-1.png' id='favicon-dark' media='(prefers-color-scheme: dark)' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0' />
        <meta name='description' content='hyvmind' />
        <title>hyvmind</title>
        <script>
            // Dynamic favicon switching based on color scheme
            (function() {
                const updateFavicon = () => {
                    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    const lightFavicon = document.getElementById('favicon-light');
                    const darkFavicon = document.getElementById('favicon-dark');
                    
                    if (lightFavicon && darkFavicon) {
                        if (isDark) {
                            lightFavicon.remove();
                            if (!document.getElementById('favicon-dark')) {
                                document.head.appendChild(darkFavicon);
                            }
                        } else {
                            darkFavicon.remove();
                            if (!document.getElementById('favicon-light')) {
                                document.head.appendChild(lightFavicon);
                            }
                        }
                    }
                };
                
                // Initial update
                updateFavicon();
                
                // Listen for color scheme changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
            })();
        </script>
    </head>
    <body>
        <div id='root'></div>
        <script type='module' src='/src/main.tsx'></script>
    </body>
</html>
