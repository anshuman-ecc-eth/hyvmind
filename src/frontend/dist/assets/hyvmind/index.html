<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HYVMIND</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; touch-action: none; }
  body { font-family: monospace; display: flex; align-items: center; justify-content: center; }
  body:focus { outline: none; }


  /* ── Layout (desktop) ── */
  .layout { display: flex; align-items: center; gap: 24px; }
  .dpad { position: relative; width: 110px; height: 138px; flex-shrink: 0; }
  .dpad-btn { position: absolute; width: 46px; height: 46px; background: rgba(255,255,255,0.5); border: 2px solid #888; border-radius: 6px; color: #000; font-size: 19px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; transition: transform 0.15s; }
  .dpad-btn:active, .dpad-btn.active { background: #fff3d4; border-color: #f0c060; color: #c89420; transform: scale(0.95); }
  .dpad-up    { top: 0; left: 32px; }
  .dpad-down  { bottom: 0; left: 32px; }
  .dpad-left  { left: 0; top: 46px; }
  .dpad-right { right: 0; top: 46px; }
  .action-buttons { display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; }
  .action-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.5); border: 2px solid #888; color: #000; font-family: 'Press Start 2P', monospace; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; transition: transform 0.15s; }
  .action-btn:active, .action-btn.active { background: #fff3d4; border-color: #f0c060; color: #c89420; transform: scale(0.95); }

  .game-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
  .layout { display: flex; align-items: center; gap: 24px; width: fit-content; flex-shrink: 0; background: rgba(0,0,0,0.7); padding: 16px; border-radius: 4px; }
  .screen { width: 500px; height: 500px; overflow: hidden; position: relative; box-shadow: 0 0 60px rgba(0,0,0,0.9); flex-shrink: 0; }
  .viewport { position: absolute; inset: 0; overflow: hidden; }
  .viewport { position: absolute; inset: 0; overflow: hidden; }
  .world-layer { display: block; image-rendering: pixelated; position: absolute; top: 0; left: 0; }
  .game-layer { position: absolute; inset: 0; z-index: 1; }
  .sprite { position: absolute; left: 0; top: 0; width: 32px; height: 36px; background-size: 32px 36px; image-rendering: pixelated; pointer-events: none; background-repeat: no-repeat; z-index: 5; will-change: transform; }

  /* ── Tablet/small desktop (601-1024px): flex layout ── */
  @media (max-width: 1024px) and (min-width: 601px) {
    .layout { width: auto; justify-content: center; }
    .screen { flex: 0 1 500px; min-width: 100px; height: auto; aspect-ratio: 550/480; }
    .dpad-btn { border-radius: 4px; }
  }
  @media (max-width: 1024px) and (min-width: 769px) {
    .layout { gap: 12px; }
    .dpad { width: 82px; height: 104px; }
    .dpad-btn { width: 34px; height: 34px; font-size: 14px; border-radius: 7px; }
    .dpad-up    { left: 24px; }
    .dpad-down  { left: 24px; }
    .dpad-left  { top: 34px; }
    .dpad-right { top: 34px; }
    .action-btn { width: 42px; height: 42px; font-size: 14px; }
  }
  @media (max-width: 768px) and (min-width: 601px) {
    .layout { gap: 8px; }
    .dpad { width: 76px; height: 96px; }
    .dpad-btn { width: 32px; height: 32px; font-size: 13px; }
    .dpad-up    { left: 22px; }
    .dpad-down  { left: 22px; }
    .dpad-left  { top: 32px; }
    .dpad-right { top: 32px; }
    .action-btn { width: 38px; height: 38px; font-size: 14px; }
  }

  @media (max-width: 600px) {
    .dpad-btn { width: 52px; height: 52px; font-size: 20px; }
    .dpad-up { top: 3px; left: 48px; }
    .dpad-down { bottom: 3px; left: 48px; }
    .dpad-left { left: 3px; top: 48px; }
    .dpad-right { right: 3px; top: 48px; }
    .action-btn { width: 56px; height: 56px; font-size: 18px; }
  }

  /* ── Rotate prompt (portrait + small screens) ── */
  .rotate-prompt {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0a0a12;
    color: #e0d0b0;
    font-family: monospace;
    text-align: center;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 30px;
  }
  .rotate-prompt .icon { font-size: 48px; margin-bottom: 4px; }
  .rotate-prompt .text { font-size: 13px; line-height: 1.6; letter-spacing: 1px; }
  .rotate-prompt .sub { font-size: 9px; color: #666; margin-top: 8px; cursor: pointer; text-decoration: underline; }

  @media (orientation: portrait) and (max-width: 700px) {
    .rotate-prompt { display: flex; }
    .layout { display: none; }
  }
  @media (orientation: portrait) and (max-width: 700px) and (min-width: 500px) {
    /* Tablets in portrait: show prompt but keep game accessible */
    .rotate-prompt { display: flex; }
    .layout { display: none; }
  }
</style>
</head>
<body tabindex="-1">

  <div class="icon">↻</div>
  <div class="text">Please rotate your device to landscape mode</div>
  <div class="sub" onclick="dismissRotate()">Continue in portrait</div>
</div>

    </div>

</div>

<audio id="bgm" src="/assets/hyvmind/forest.mp3" loop preload="auto"></audio>
<script>
var ASSETS = '/assets/hyvmind';
var WORLD_W = 574, WORLD_H = 2176;
var SCREEN_W = 550, SCREEN_H = 480;
var TILE = 8;
var COLS = 72, ROWS = 272;
function frm(col, row, prefix) { return 'url(' + ASSETS + '/sprites/' + (prefix||'cultist') + '_' + col + '_' + row + '.png)'; }

var gamePaused = false;

function dismissRotate() {
  document.getElementById('rotatePrompt').style.display = 'none';
  gamePaused = false;
}

var mq = window.matchMedia('(orientation: portrait) and (max-width: 700px)');
mq.addEventListener('change', function(e) {
  gamePaused = e.matches;
});
gamePaused = mq.matches;
var currentScore = 0;
var storedSecrets = [];
var isGenerating = false;
var activeMenu = null;
var menuSelected = 0;
var secretsScroll = 0;

// ── Boat / ferry constants ──
var BOAT_SHEET = ASSETS + '/sprites/rowboat.png';
var BOAT_FRAME_W = 73, BOAT_FRAME_H = 73;
var BOAT_SPRITESHEET_W = 192, BOAT_SPRITESHEET_H = 160;
var BOAT_SOUTH_X = 1, BOAT_SOUTH_Y = 17;
var BOAT_NORTH_X = 98, BOAT_NORTH_Y = 17;
var BOAT_TILE_SIZE = 8;
var BOAT_STEP = 3; // pixels per tick when driving
var BOAT_LR_W = 146, BOAT_LR_H = 53; // left/right frame size
var BOAT_UP_W = 52, BOAT_UP_H = 145;
var BOAT_DOWN_W = 52, BOAT_DOWN_H = 145;

var boatX = 160, boatY = 160;
var boatEl = null;
var isRiding = false;
var boatTerminalCenter = null;
var boatTriggerKeys = {};
var boatBlockedTiles = {};

window.addEventListener('message', function(e) {
  if (e.data?.type === 'hyvmind-resume') { console.log('RESUME received'); gamePaused = false; navPaused = false; document.body.focus(); }
  if (e.data?.type === 'hyvmind-focus') { requestAnimationFrame(function() { document.body.focus(); }); }
  if (e.data?.type === 'hyvmind-score-update') { currentScore = e.data.score || 0; }
  if (e.data?.type === 'hyvmind-popup') {
    if (e.data?.msg) showPopup(e.data.msg);
  }
  if (e.data?.type === 'hyvmind-generating') {
    isGenerating = true;
    activeMenu = 'loading';
    closePopup();
  var pop = document.createElement('div');
  pop.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:auto;';
    pop.innerHTML = '<div style="background:linear-gradient(180deg,#1a1208,#2a1e0e);border:3px solid #8a7a4a;border-radius:2px;padding:24px 32px;text-align:center;font-family:monospace;color:#c8a860;font-size:15px;box-shadow:0 0 40px rgba(0,0,0,0.9);">Generating secret..</div>';
    (document.querySelector('.screen') || document.body).appendChild(pop);
  activePopup = pop;
}

function showBavaDialog() {
  if (activePopup) activePopup.remove();
  var pop = document.createElement('div');
  pop._type = 'bava';
  pop._step = 0; // 0 = menu, 1+ = showing response to that index
  pop._selected = 0;
  pop.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:auto;';
  renderBavaPopup(pop);
  (document.querySelector('.screen') || document.body).appendChild(pop);
  activePopup = pop;
}

function renderBavaPopup(pop) {
  if (pop._step === 0) {
    renderBavaMenu(pop);
  } else {
    renderBavaResponse(pop);
  }
}

function renderBavaMenu(pop) {
  var sel = pop._selected;
  var items = '';
  for (var i = 0; i < BAVA_DIALOGS.length; i++) {
    var arrow = i === sel ? '>' : '&nbsp;';
    var cls = i === sel ? 'color:#b0e0f0;' : 'color:#6a8a9a;';
    items += '<div style="font-family:monospace;font-size:13px;' + cls + 'text-align:left;padding:4px 8px;letter-spacing:0.5px;">' + arrow + ' ' + BAVA_DIALOGS[i].question + '</div>';
  }
  pop.innerHTML = '<div style="background:linear-gradient(180deg,#0a1a2a,#0e2a3e);border-image:linear-gradient(135deg,#4a7a8a,#60c0f0,#4a7a8a) 1;border:3px solid;border-radius:2px;box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.5);min-width:280px;max-width:85%;position:relative"><div style="margin:3px;background:linear-gradient(180deg,#0e1a2a,#0a141e);border:1px solid #2a5a6a;padding:16px 20px 12px"><div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#2a5a6a,#60c0f0,#2a5a6a);height:3px;width:60%;border-radius:1px;"></div><div style="font-family:monospace;font-size:14px;color:#b0e0f0;text-align:center;line-height:1.7;text-shadow:0 1px 3px rgba(0,0,0,0.6);letter-spacing:1px;margin-bottom:8px;">~ Bava ~</div><div style="font-family:monospace;font-size:11px;color:#7ab0c0;text-align:center;letter-spacing:0.5px;margin-bottom:8px;">Ask me anything:</div>' + items + '<div style="margin-top:10px;padding-top:8px;border-top:1px solid #1a3a4a;text-align:center;font-family:monospace;font-size:10px;color:#5a8a9a;letter-spacing:1px"><span style="border:1px solid #3a6a7a;padding:1px 5px;background:rgba(0,0,0,0.3);border-radius:1px;color:#7ab0c0">Z</span> select <span style="border:1px solid #3a6a7a;padding:1px 5px;background:rgba(0,0,0,0.3);border-radius:1px;color:#7ab0c0">X</span> close</div></div></div>';
}

function renderBavaResponse(pop) {
  var idx = pop._step - 1;
  var response = idx >= 0 && idx < BAVA_DIALOGS.length ? BAVA_DIALOGS[idx].response : '';
  var question = idx >= 0 && idx < BAVA_DIALOGS.length ? BAVA_DIALOGS[idx].question : '';
  pop.innerHTML = '<div style="background:linear-gradient(180deg,#0a1a2a,#0e2a3e);border-image:linear-gradient(135deg,#4a7a8a,#60c0f0,#4a7a8a) 1;border:3px solid;border-radius:2px;box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.5);min-width:280px;max-width:85%;position:relative"><div style="margin:3px;background:linear-gradient(180deg,#0e1a2a,#0a141e);border:1px solid #2a5a6a;padding:16px 20px 12px"><div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#2a5a6a,#60c0f0,#2a5a6a);height:3px;width:60%;border-radius:1px;"></div><div style="font-family:monospace;font-size:11px;color:#6a9aaa;text-align:center;letter-spacing:0.5px;margin-bottom:6px;">~ ' + question + ' ~</div><div style="font-family:monospace;font-size:14px;color:#b0e0f0;text-align:center;line-height:1.7;text-shadow:0 1px 3px rgba(0,0,0,0.6);letter-spacing:0.5px;padding:4px 0;">' + response + '</div><div style="margin-top:10px;padding-top:8px;border-top:1px solid #1a3a4a;text-align:center;font-family:monospace;font-size:10px;color:#5a8a9a;letter-spacing:1px"><span style="border:1px solid #3a6a7a;padding:1px 5px;background:rgba(0,0,0,0.3);border-radius:1px;color:#7ab0c0">Z</span> back <span style="border:1px solid #3a6a7a;padding:1px 5px;background:rgba(0,0,0,0.3);border-radius:1px;color:#7ab0c0">X</span> close</div></div></div>';
}
  if (e.data?.type === 'hyvmind-buzz-secret') {
    isGenerating = false;
    currentScore = e.data.score || 0;
    if (e.data.secret) storedSecrets.push({ secret: e.data.secret, score: e.data.score || 0 });
  closePopup();
    showSecretsMenu();
  }
});

var dirMap = [2, 3, 1, 0];
var dirMap = [2, 3, 1, 0];
var dirMap = [2, 3, 1, 0];
var collisionMap = [];
for (var y = 0; y < ROWS; y++) { collisionMap[y] = []; for (var x = 0; x < COLS; x++) collisionMap[y][x] = 1; }

function initCollision(callback) {
  var img = new Image();
  img.onload = function() {
    try {
      var c = document.createElement('canvas');
      c.width = COLS; c.height = ROWS;
      var cx = c.getContext('2d', { willReadFrequently: true });
      cx.drawImage(img, 0, 0);
      var data = cx.getImageData(0, 0, COLS, ROWS).data;
      for (var y = 0; y < ROWS; y++)
        for (var x = 0; x < COLS; x++) {
          var idx = (y * COLS + x) * 4;
          var r = data[idx], g = data[idx+1], b = data[idx+2], a = data[idx+3];
          if (a === 0) collisionMap[y][x] = 0;
          else if (r > 150 && b > 150 && g < 150) collisionMap[y][x] = 4;
          else if (g > 150 && b > 150 && r < 150) collisionMap[y][x] = 5;
          else if (g > 150 && r < 150) collisionMap[y][x] = 1;
          else if (b > 150 && r < 150 && g < 150) collisionMap[y][x] = 6;
          else collisionMap[y][x] = 0;
        }
    } catch(e) { console.error('initCollision error:', e); }
    callback();
  };
  img.onerror = function() { console.error('initCollision img load failed'); callback(); };
  img.src = ASSETS + '/collision.png';
}

var triggerMessages = {};
var triggerPositions = [];
var lastTriggerTile = null;
var doorLabels = {};
var doorPositions = [];
var nearDoor = null;

function scanBoatTriggers() {
  boatTriggerKeys = {};
  boatBlockedTiles = {};
  boatTerminalCenter = null;
  var t1sumX = 0, t1sumY = 0, t1c = 0;
  var blockedKeys = [];
  for (var key in triggerMessages) {
    var msg = triggerMessages[key];
    if (msg === 'boat terminal 1') {
      boatTriggerKeys[key] = true;
      var parts = key.split(',');
      t1sumX += parseInt(parts[0]); t1sumY += parseInt(parts[1]); t1c++;
    } else if (msg === 'boat terminal 2') {
      boatTriggerKeys[key] = true;
    } else if (msg === 'blocked') {
      boatBlockedTiles[key] = true;
      blockedKeys.push(key);
    }
  }
  // Remove blocked entries from triggerMessages so no sparkles or Z dialogs
  for (var i = 0; i < blockedKeys.length; i++) {
    delete triggerMessages[blockedKeys[i]];
  }
  if (t1c > 0) {
    boatTerminalCenter = {tx: Math.round(t1sumX / t1c), ty: Math.round(t1sumY / t1c)};
  }
}

function loadTriggers(callback) {
  fetch(ASSETS + '/triggers.json')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      triggerMessages = d || {};
      triggerPositions = [];
      var cmap = {};
      for (var y = 0; y < ROWS; y++)
        for (var x = 0; x < COLS; x++)
          if (collisionMap[y][x] === 4) { triggerPositions.push({tx: x, ty: y, key: x+','+y}); cmap[x+','+y] = true; }
      for (var key in triggerMessages) {
        if (!cmap[key]) {
          var parts = key.split(',');
          triggerPositions.push({tx: parseInt(parts[0]), ty: parseInt(parts[1]), key: key});
        }
      }
    })
    .catch(function() { triggerMessages = {}; triggerPositions = []; })
    .then(function() {
      fetch(ASSETS + '/doors.json')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          doorLabels = d || {};
          doorPositions = [];
          for (var y = 0; y < ROWS; y++)
            for (var x = 0; x < COLS; x++)
              if (collisionMap[y][x] === 6) doorPositions.push({tx: x, ty: y, key: x+','+y});
          scanBoatTriggers();
          callback();
        })
        .catch(function() { doorLabels = {}; doorPositions = []; callback(); });
    });
}

function checkNearbyTriggers(gx, gy) {
  var tx = Math.floor((gx + 16) / TILE);
  var ty = Math.floor((gy + 14) / TILE);
  nearTrigger = null;
  nearDoor = null;
  var bestDist = 999;
  for (var i = 0; i < triggerPositions.length; i++) {
    var tp = triggerPositions[i];
    if (triggerMessages[tp.key]) {
      var dist = Math.abs(tp.tx - tx) + Math.abs(tp.ty - ty);
      if (dist < bestDist) { bestDist = dist; nearTrigger = tp; }
    }
  }
  if (bestDist > 3) nearTrigger = null;
  var doorDist = 999;
  for (var i = 0; i < doorPositions.length; i++) {
    var dp = doorPositions[i];
    var dist = Math.abs(dp.tx - tx) + Math.abs(dp.ty - ty);
    if (dist < doorDist) { doorDist = dist; nearDoor = dp; }
  }
  if (doorDist > 3) nearDoor = null;
}

var activePopup = null;
var triggerMemory = {};
function showPopup(msg) {
  if (activePopup) { if (activePopup._type !== 'door') activePopup.remove(); else return; }
  // If message starts with >>, show input popup instead
  if (msg.indexOf('>>') === 0) { showInputPopup(msg); return; }
  var pop = document.createElement('div');
  pop._dismissKey = 'msg:' + msg;
  pop.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:auto;';
  pop.innerHTML = '<div style="background:linear-gradient(180deg,#1a1208,#2a1e0e);border-image:linear-gradient(135deg,#8a7a4a,#c8a860,#8a7a4a) 1;border:3px solid;border-radius:2px;box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.5);min-width:260px;max-width:85%;position:relative"><div style="margin:3px;background:linear-gradient(180deg,#2a2010,#1a1408);border:1px solid #5a4a2a;padding:20px 24px 16px"><div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#5a4a2a,#c8a860,#5a4a2a);height:3px;width:60%;border-radius:1px;"></div><div style="font-family:monospace;font-size:14px;color:#e0d0b0;text-align:center;line-height:1.7;text-shadow:0 1px 3px rgba(0,0,0,0.6);letter-spacing:0.5px;min-height:50px;">' + msg + '</div><div style="margin-top:14px;padding-top:10px;border-top:1px solid #3a2e18;text-align:center;font-family:monospace;font-size:14px;color:#7a6a4a;letter-spacing:1px"><span style="border:1px solid #5a4a2a;padding:1px 5px;background:rgba(0,0,0,0.3);border-radius:1px;color:#8a7a5a">X</span> close</div></div></div>';
  (document.querySelector('.screen') || document.body).appendChild(pop);
  activePopup = pop;
}
function showDefaultPopup() {
  if (activePopup) { if (activePopup._type !== 'door') activePopup.remove(); else return; }
  var pop = document.createElement('div');

function isWalkable(gx, gy) {
  var tx = Math.floor((gx + 16) / TILE);
  var ty = Math.floor((gy + 14) / TILE);
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return false;
  var v = collisionMap[ty][tx];
  return v === 1 || v === 5;
}

function findNearestWalkable(gx, gy) {
  var tx = Math.floor((gx + 16) / TILE);
  var ty = Math.floor((gy + 14) / TILE);
  for (var r = 0; r < 200; r++) {
    for (var dy = -r; dy <= r; dy++) {
      for (var dx = -r; dx <= r; dx++) {
        if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
        var nx = tx + dx, ny = ty + dy;
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
        var v = collisionMap[ny][nx];
        if (v === 1) {
          return { x: nx * TILE + 4 - 16, y: ny * TILE + 4 - 14 };
        }
      }
    }
  }
  return { x: gx, y: gy };
}

  worldBg.style.top = (-camY) + 'px';

  var pTileY = Math.floor((py + 14) / TILE);

      var angle = t * sparkleSpeeds[s] + sparklePhases[s];
      var hue = (sparkleHues[s] + t * 40) % 360;
      sparkles[s].style.left = (px - camX + 16 + Math.cos(angle) * sparkleRadii[s]) + 'px';
      sparkles[s].style.top = (py - camY + 16 + Math.sin(angle) * sparkleRadii[s]) + 'px';
      sparkles[s].style.background = 'hsl(' + hue + ', 100%, 70%)';
      sparkles[s].style.boxShadow = '0 0 ' + (sparkleSizes[s] + 4) + 'px hsl(' + hue + ', 100%, 55%)';
      sparkles[s].style.opacity = 0.7 + 0.3 * Math.sin(angle * 2.5);
    } else {
      sparkles[s].style.opacity = 0;
    }
  }
  // Auto-show door confirmation popup when near a labeled door
  var doorLabel = nearDoor && doorLabels[nearDoor.key];
  if (nearDoor) {
    if (lastNearDoorKey !== nearDoor.key) { doorDismissed = false; lastNearDoorKey = nearDoor.key; }
  } else {
    lastNearDoorKey = null;
  }
  if (activePopup && (activePopup._type === 'startup' || activePopup._type === 'welcome')) {
    // keep popup visible
  } else if (nearDoor && !doorDismissed && Date.now() - (popupDismissedAt['door:' + (doorLabel || 'unlabeled')] || 0) > 5000) {
    showDoorPopup(doorLabel);
  } else {
    closeDoorPopup();
  }
}

document.addEventListener('keyup', function(e) {
  if (e.key.startsWith('Arrow')) {
    var dir = e.key.slice(5).toLowerCase();
    var btn = document.querySelector('.dpad-btn.dpad-' + dir);
    if (btn) { btn.classList.remove('active'); dpadState[dir] = false; }
  }
});

var dpadState = {};
document.querySelectorAll('.dpad-btn').forEach(function(btn) {
  function start(e) { e.preventDefault(); btn.classList.add('active'); dpadState[btn.dataset.dir] = true; }
  function end(e) { e.preventDefault(); btn.classList.remove('active'); dpadState[btn.dataset.dir] = false; }
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
  btn.addEventListener('mouseleave', end);
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('touchend', end, { passive: false });
  btn.addEventListener('touchcancel', end, { passive: false });
});

document.getElementById('btnZ').addEventListener('click', function() {
  this.classList.add('active');
  activateZ();
  setTimeout(function() { this.classList.remove('active'); }.bind(this), 150);
});
document.getElementById('btnX').addEventListener('click', function() {
  this.classList.add('active');
  if (activePopup && activePopup._type === 'door') doorDismissed = true;
  if (activePopup && activePopup._type === 'secrets') { closePopup(); menuSelected = 0; secretsScroll = 0; activeMenu = null; }
  else if (activePopup && activePopup._type === 'view-secrets') { closePopup(); activeMenu = 'secrets'; showSecretsMenu(); }
  else if (activePopup && (activePopup._type === 'startup' || activePopup._type === 'welcome')) { closePopup(); gamePaused = false; }
  else { closePopup(); }
  setTimeout(function() { this.classList.remove('active'); }.bind(this), 150);
});

var tick = 0;
function loop() {
  if (navPaused) {
    render(); renderNPC(); renderBoat();
    navPauseTick++;
    if (navPauseTick > 40) { navPaused = false; console.log('navPaused fallback timeout'); }
    return;
  }
  if (gamePaused) { render(); renderNPC(); renderBoat(); return; }
  tick++;
  if (isRiding) {
    // Player drives the boat with dpad; sync player direction
    var bdx = 0, bdy = 0;
    if (dpadState['left']) { bdx = -BOAT_STEP; pDir = 1; }
    else if (dpadState['right']) { bdx = BOAT_STEP; pDir = 2; }
    else if (dpadState['up']) { bdy = -BOAT_STEP; pDir = 3; }
    else if (dpadState['down']) { bdy = BOAT_STEP; pDir = 0; }
    if (bdx !== 0 || bdy !== 0) {
      var nbx = boatX + bdx, nby = boatY + bdy;
      // Check if the tile at the boat's center is blocked
      var centerIsBlocked = function(gx, gy) {
        var tx2 = Math.floor((gx + BOAT_FRAME_W/2) / TILE);
        var ty2 = Math.floor((gy + BOAT_FRAME_H/2) / TILE);
        if (tx2 < 0 || tx2 >= COLS || ty2 < 0 || ty2 >= ROWS) return true;
        var k = tx2+','+ty2;
        if (collisionMap[ty2][tx2] === 1) {
          return !(boatTriggerKeys[k] && (triggerMessages[k] === 'boat terminal 1' || triggerMessages[k] === 'boat terminal 2'));
        }
        if (boatBlockedTiles[k]) return true;
        return false;
      };
      if (bdx !== 0) {
        var nbx = boatX + bdx;
        if (!centerIsBlocked(nbx, boatY)) boatX = nbx;
      }
      if (bdy !== 0) {
        var nby = boatY + bdy;
        if (!centerIsBlocked(boatX, nby)) boatY = nby;
      }
    }
    boatX = Math.max(0, Math.min(WORLD_W - BOAT_FRAME_W, boatX));
    boatY = Math.max(0, Math.min(WORLD_H - BOAT_FRAME_H, boatY));
    px = boatX + Math.floor(BOAT_FRAME_W/2) - 16;
    py = boatY + Math.floor(BOAT_FRAME_H/2) - 35;
  } else {
    var dx = 0, dy = 0;
    if (dpadState['left']) { dx = -STEP; pDir = 1; }
    else if (dpadState['right']) { dx = STEP; pDir = 2; }
    else if (dpadState['up']) { dy = -STEP; pDir = 3; }
    else if (dpadState['down']) { dy = STEP; pDir = 0; }
    if (dx !== 0 || dy !== 0) {
      var nx = px + dx, ny = py + dy;
      var wizBlock = function(gx, gy) {
        var tx = Math.floor((gx + 16) / TILE);
        var ty = Math.floor((gy + 14) / TILE);
        return (tx === npcTileX && ty === npcTileY);
      };
      if (dx !== 0 && isWalkable(nx, py) && !wizBlock(nx, py)) px = nx;
      if (dy !== 0 && isWalkable(px, ny) && !wizBlock(px, ny)) py = ny;
      pMoving = true;
      if (tick % 2 === 0) pWalk++;
    } else { pMoving = false; pWalk = 0; }
    px = Math.max(0, Math.min(WORLD_W - 32, px));
    py = Math.max(0, Math.min(WORLD_H - 32, py));
  }
  checkNearbyTriggers(px, py);
  updateNPC();
  render();
  renderNPC();
  renderBoat();
}

var bgm = document.getElementById('bgm');
var bgmStarted = false;
function startBGM() {
  if (bgmStarted) return;
  bgmStarted = true;
  bgm.volume = 0.35;
  bgm.play().catch(function(){});
  document.removeEventListener('keydown', startBGM);
  document.removeEventListener('click', startBGM);
  document.removeEventListener('touchend', startBGM);
}
document.addEventListener('keydown', startBGM);
document.addEventListener('click', startBGM);
document.addEventListener('touchend', startBGM);

initCollision(function() {
  loadTriggers(function() {
    if (!isWalkable(px, py)) {
      var n = findNearestWalkable(px, py);
      px = n.x; py = n.y;
      if (!isWalkable(px, py)) {
        for (var yy = -16; yy <= 16; yy += 8)
          for (var xx = -16; xx <= 16; xx += 8)
            if (isWalkable(144 + xx, 194 + yy)) { px = 144 + xx; py = 194 + yy; yy = 999; break; }
      }
    }
    npcInit();
    initBoat();
    render();
    setTimeout(function() {
      window.parent.postMessage({ type: 'hyvmind-loaded' }, '*');
    }, 300);
    setInterval(loop, 40);
    requestAnimationFrame(function() { document.body.focus(); });
    console.log('HYVMIND DEBUG: triggers=' + triggerPositions.length + ' doors=' + doorPositions.length + ' triggerMessages=' + Object.keys(triggerMessages).length + ' doorLabels=' + Object.keys(doorLabels).length + ' boatTerminalCenter=' + (boatTerminalCenter ? boatTerminalCenter.tx+','+boatTerminalCenter.ty : 'none') + ' nearTrigger=' + (nearTrigger ? nearTrigger.key : 'null'));
  });
});

// Reload collision data without page refresh
function reloadCollisionData() {
  var oldPx = px, oldPy = py;
  var img = new Image();
  img.onload = function() {
    try {
      var c = document.createElement('canvas');
      c.width = COLS; c.height = ROWS;
      var cx = c.getContext('2d', { willReadFrequently: true });
      cx.drawImage(img, 0, 0);
      var data = cx.getImageData(0, 0, COLS, ROWS).data;
      for (var y = 0; y < ROWS; y++)
        for (var x = 0; x < COLS; x++) {
          var idx = (y * COLS + x) * 4;
          var r = data[idx], g = data[idx+1], b = data[idx+2], a = data[idx+3];
          if (a === 0) collisionMap[y][x] = 0;
          else if (r > 150 && b > 150 && g < 150) collisionMap[y][x] = 4;
          else if (g > 150 && b > 150 && r < 150) collisionMap[y][x] = 5;
          else if (g > 150 && r < 150) collisionMap[y][x] = 1;
          else if (b > 150 && r < 150 && g < 150) collisionMap[y][x] = 6;
          else collisionMap[y][x] = 0;
        }
    } catch(e) { console.error('reloadCollision decode error:', e); }
    // Build positions from refreshed collision map
    triggerPositions = [];
    doorPositions = [];
    for (var y = 0; y < ROWS; y++)
      for (var x = 0; x < COLS; x++) {
        if (collisionMap[y][x] === 4) triggerPositions.push({tx: x, ty: y, key: x+','+y});
        if (collisionMap[y][x] === 6) doorPositions.push({tx: x, ty: y, key: x+','+y});
      }
    fetch(ASSETS + '/triggers.json')
      .then(function(r) { return r.json(); })
      .then(function(d) { triggerMessages = d || {}; })
      .catch(function() { triggerMessages = {}; })
      .then(function() {
        return fetch(ASSETS + '/doors.json');
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        doorLabels = d || {};
        scanBoatTriggers();
        if (isRiding) { isRiding = false; }
        initBoat();
        px = oldPx; py = oldPy;
        closePopup();
        console.log('MAP RELOADED: triggers=' + triggerPositions.length + ' doors=' + doorPositions.length + ' triggerMessages=' + Object.keys(triggerMessages).length + ' doorLabels=' + Object.keys(doorLabels).length);
      })
      .catch(function(e) { console.error('MAP RELOAD FAILED:', e); });
  };
  img.onerror = function() { console.error('reloadCollision img load failed'); };
  img.src = ASSETS + '/collision.png';
}

// Auto-fit layout for phones and tablets: detect narrow viewport and apply overlay via JS
function fitLayout() {
  var w = window.innerWidth;
  var layout = document.querySelector('.layout');
  var screen = document.querySelector('.screen');
  var dpad = document.querySelector('.dpad');
  var actions = document.querySelector('.action-buttons');
  if (w <= 600) {
    layout.style.cssText = 'display:block;position:relative;width:100%;height:100%;background:rgba(0,0,0,0.7);';
    screen.style.cssText = 'width:100%;height:100%;min-width:0;min-height:0;aspect-ratio:auto;';
    dpad.style.cssText = 'position:absolute;bottom:14px;left:10px;width:150px;height:150px;z-index:10;';
    actions.style.cssText = 'display:flex;flex-direction:row;position:absolute;bottom:22px;right:14px;gap:12px;z-index:10;';
  } else {
    layout.style.cssText = '';
    screen.style.cssText = '';
    dpad.style.cssText = '';
    actions.style.cssText = '';
  }
}
window.addEventListener('resize', fitLayout);
setTimeout(fitLayout, 100);

// Auto-poll for map changes every 3 seconds
var lastMapSize = 0;
function pollMapUpdate() {
  fetch(ASSETS + '/collision.png?' + Date.now(), { method: 'HEAD' })
    .then(function(r) {
      var size = parseInt(r.headers.get('Content-Length')) || 0;
      if (lastMapSize !== 0 && size !== 0 && size !== lastMapSize) {
        console.log('MAP CHANGE DETECTED: size=' + size + ' (was ' + lastMapSize + '), reloading...');
        reloadCollisionData();
      }
      if (size !== 0) lastMapSize = size;
    })
    .catch(function() {});
}
setInterval(pollMapUpdate, 3000);
</script>
