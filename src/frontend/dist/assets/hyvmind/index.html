<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HYVMIND</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; touch-action: none; }
  body { font-family: monospace; display: flex; align-items: center; justify-content: center; }
  body:focus { outline: none; }

  /* ── Layout (desktop) ── */
  .layout { display: flex; align-items: center; gap: 24px; }
  .dpad { position: relative; width: 216px; height: 216px; flex-shrink: 0; }
  .dpad-btn { position: absolute; width: 72px; height: 72px; background: rgba(20,20,20,0.55); border: 2px solid rgba(255,255,255,0.12); border-radius: 10px; color: rgba(255,255,255,0.35); font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; backdrop-filter: blur(2px); }
  .dpad-btn:active, .dpad-btn.active { background: rgba(68,68,68,0.7); border-color: rgba(240,192,96,0.5); color: #f0c060; }
  .dpad-up    { top: 0; left: 72px; }
  .dpad-down  { bottom: 0; left: 72px; }
  .dpad-left  { left: 0; top: 72px; }
  .dpad-right { right: 0; top: 72px; }
  .action-buttons { display: flex; flex-direction: row; gap: 24px; flex-shrink: 0; }
  .action-btn { width: 88px; height: 88px; border-radius: 50%; background: rgba(20,20,20,0.55); border: 2px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.35); font-family: 'Press Start 2P', monospace; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: none; backdrop-filter: blur(2px); }
  .action-btn:active, .action-btn.active { background: rgba(68,68,68,0.7); border-color: rgba(240,192,96,0.5); color: #f0c060; }
  .screen { width: 574px; height: 480px; border: 3px solid #555; overflow: hidden; position: relative; box-shadow: 0 0 60px rgba(0,0,0,0.9); flex-shrink: 0; }
  .viewport { position: absolute; inset: 0; overflow: hidden; }
  .world-layer { display: block; image-rendering: pixelated; position: absolute; top: 0; left: 0; }
  .game-layer { position: absolute; inset: 0; z-index: 1; }
  .sprite { position: absolute; image-rendering: pixelated; pointer-events: none; background-repeat: no-repeat; }

  /* ── Tablet / small desktop (769-1024px) ── */
  @media (max-width: 1024px) and (min-width: 769px) {
    .layout { gap: 12px; }
    .screen { flex: 1; min-width: 0; height: auto; aspect-ratio: 574/480; border-width: 2px; }
    .dpad { width: 162px; height: 162px; }
    .dpad-btn { width: 54px; height: 54px; font-size: 22px; border-radius: 7px; }
    .dpad-up    { left: 54px; }
    .dpad-down  { left: 54px; }
    .dpad-left  { top: 54px; }
    .dpad-right { top: 54px; }
    .action-btn { width: 66px; height: 66px; font-size: 12px; }
  }

  /* ── Narrow screens: overlay controls on top of screen ── */
  @media (max-width: 768px) {
    .layout {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
    }
    .screen {
      width: 100%;
      height: 100%;
      min-width: 320px;
      min-height: 267px;
      border-width: 2px;
      aspect-ratio: auto;
    }
    .dpad {
      position: absolute;
      bottom: 14px;
      left: 10px;
      width: 150px;
      height: 150px;
      z-index: 10;
    }
    .dpad-btn {
      width: 50px;
      height: 50px;
      font-size: 20px;
      border-radius: 8px;
      border-width: 2px;
    }
    .dpad-up    { left: 50px; }
    .dpad-down  { left: 50px; }
    .dpad-left  { top: 50px; }
    .dpad-right { top: 50px; }
    .action-buttons {
      position: absolute;
      bottom: 22px;
      right: 14px;
      gap: 12px;
      z-index: 10;
    }
    .action-btn {
      width: 60px;
      height: 60px;
      font-size: 12px;
      border-width: 2px;
    }
  }

  /* ── Very narrow screens (e.g., small landscape phones) ── */
  @media (max-width: 480px) {
    .dpad { width: 120px; height: 120px; bottom: 10px; left: 6px; }
    .dpad-btn { width: 40px; height: 40px; font-size: 16px; border-radius: 6px; }
    .dpad-up    { left: 40px; }
    .dpad-down  { left: 40px; }
    .dpad-left  { top: 40px; }
    .dpad-right { top: 40px; }
    .action-buttons { bottom: 16px; right: 8px; gap: 8px; }
    .action-btn { width: 48px; height: 48px; font-size: 10px; }
  }

  /* ── Rotate prompt (portrait + small screens) ── */
  .rotate-prompt {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0a0a12;
    color: #e0d0b0;
    font-family: monospace;
    text-align: center;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 30px;
  }
  .rotate-prompt .icon { font-size: 48px; margin-bottom: 4px; }
  .rotate-prompt .text { font-size: 13px; line-height: 1.6; letter-spacing: 1px; }
  .rotate-prompt .sub { font-size: 9px; color: #666; margin-top: 8px; cursor: pointer; text-decoration: underline; }

  @media (orientation: portrait) and (max-width: 700px) {
    .rotate-prompt { display: flex; }
    .layout { display: none; }
  }
  @media (orientation: portrait) and (max-width: 700px) and (min-width: 500px) {
    /* Tablets in portrait: show prompt but keep game accessible */
    .rotate-prompt { display: flex; }
    .layout { display: none; }
  }
</style>
</head>
<body tabindex="-1">

<div class="rotate-prompt" id="rotatePrompt">
  <div class="icon">↻</div>
  <div class="text">Please rotate your device to landscape mode</div>
  <div class="sub" onclick="dismissRotate()">Continue in portrait</div>
</div>

<div class="layout">
  <div class="dpad">
    <button class="dpad-btn dpad-up"    data-dir="up">&#9650;</button>
    <button class="dpad-btn dpad-down"  data-dir="down">&#9660;</button>
    <button class="dpad-btn dpad-left"  data-dir="left">&#9664;</button>
    <button class="dpad-btn dpad-right" data-dir="right">&#9654;</button>
  </div>
  <div class="screen">
    <div class="viewport" id="viewport">
      <img id="worldBg" class="world-layer" src="/assets/hyvmind/bottom.png">
      <div id="gameLayer" class="game-layer"></div>
    </div>
  </div>
  <div class="action-buttons">
    <button class="action-btn" id="btnZ">Z</button>
    <button class="action-btn" id="btnX">X</button>
  </div>
</div>

<audio id="bgm" src="/assets/hyvmind/forest.mp3" loop preload="auto"></audio>
<script>
var ASSETS = '/assets/hyvmind';
var WORLD_W = 574, WORLD_H = 2176;
var SCREEN_W = 574, SCREEN_H = 480;
var TILE = 8;
var COLS = 72, ROWS = 272;
function frm(col, row) { return 'url(' + ASSETS + '/sprites/cultist_' + col + '_' + row + '.png)'; }

var gamePaused = false;
function dismissRotate() {
  document.getElementById('rotatePrompt').style.display = 'none';
  gamePaused = false;
}

var mq = window.matchMedia('(orientation: portrait) and (max-width: 700px)');
mq.addEventListener('change', function(e) {
  gamePaused = e.matches;
});
gamePaused = mq.matches;
window.addEventListener('message', function(e) {
  if (e.data?.type === 'hyvmind-resume') { console.log('RESUME received'); gamePaused = false; }
});

var dirMap = [2, 3, 1, 0];
var collisionMap = [];
for (var y = 0; y < ROWS; y++) { collisionMap[y] = []; for (var x = 0; x < COLS; x++) collisionMap[y][x] = 1; }

function initCollision(callback) {
  fetch(ASSETS + '/collision.png?' + Date.now())
    .then(function(r) { return r.arrayBuffer(); })
    .then(function(buf) {
      var view = new DataView(buf);
      var pos = 8;
      var chunks = [];
      while (pos < buf.byteLength) {
        var len = view.getUint32(pos);
        var t = String.fromCharCode(view.getUint8(pos+4), view.getUint8(pos+5), view.getUint8(pos+6), view.getUint8(pos+7));
        if (t === 'IDAT') chunks.push(new Uint8Array(buf, pos+8, len));
        pos += 12 + len;
      }
      var total = chunks.reduce(function(s, c) { return s + c.length; }, 0);
      var comp = new Uint8Array(total);
      var off = 0;
      chunks.forEach(function(c) { comp.set(c, off); off += c.length; });
      // Strip 2-byte zlib header and 4-byte adler32, decompress
      return new Response(new Blob([comp.slice(2, -4)]).stream().pipeThrough(new DecompressionStream('deflate-raw'))).arrayBuffer();
    })
    .then(function(rawBuf) {
      var data = new Uint8Array(rawBuf);
      for (var y = 0; y < ROWS; y++)
        for (var x = 0; x < COLS; x++) {
          var idx = (y * COLS + x) * 4;
          var r = data[idx], g = data[idx+1], b = data[idx+2], a = data[idx+3];
          if (a === 0) collisionMap[y][x] = 0;
          else if (r > 150 && b > 150 && g < 150) collisionMap[y][x] = 4;
          else if (g > 150 && b > 150 && r < 150) collisionMap[y][x] = 5;
          else if (g > 150 && r < 150) collisionMap[y][x] = 1;
          else if (r > 150 && g < 150 && b < 150) collisionMap[y][x] = 2;
          else if (r > 150 && g > 150 && b < 150) collisionMap[y][x] = 3;
          else if (b > 150 && r < 150 && g < 150) collisionMap[y][x] = 6;
          else collisionMap[y][x] = 0;
        }
    })
    .catch(function(e) { console.error('initCollision failed:', e); })
    .then(function() { callback(); });
}

var triggerMessages = {};
var triggerPositions = [];
var lastTriggerTile = null;
var doorLabels = {};
var doorPositions = [];
var nearDoor = null;

function loadTriggers(callback) {
  fetch(ASSETS + '/triggers.json?' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      triggerMessages = d || {};
      triggerPositions = [];
      for (var y = 0; y < ROWS; y++)
        for (var x = 0; x < COLS; x++)
          if (collisionMap[y][x] === 4) triggerPositions.push({tx: x, ty: y, key: x+','+y});
    })
    .catch(function() { triggerMessages = {}; triggerPositions = []; })
    .then(function() {
      fetch(ASSETS + '/doors.json?' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          doorLabels = d || {};
          doorPositions = [];
          for (var y = 0; y < ROWS; y++)
            for (var x = 0; x < COLS; x++)
              if (collisionMap[y][x] === 6) doorPositions.push({tx: x, ty: y, key: x+','+y});
          callback();
        })
        .catch(function() { doorLabels = {}; doorPositions = []; callback(); });
    });
}

function checkNearbyTriggers(gx, gy) {
  var tx = Math.floor((gx + 16) / TILE);
  var ty = Math.floor((gy + 14) / TILE);
  nearTrigger = null;
  nearDoor = null;
  var bestDist = 999;
  for (var i = 0; i < triggerPositions.length; i++) {
    var tp = triggerPositions[i];
    if (triggerMessages[tp.key]) {
      var dist = Math.abs(tp.tx - tx) + Math.abs(tp.ty - ty);
      if (dist < bestDist) { bestDist = dist; nearTrigger = tp; }
    }
  }
  if (bestDist > 3) nearTrigger = null;
  var doorDist = 999;
  for (var i = 0; i < doorPositions.length; i++) {
    var dp = doorPositions[i];
    var dist = Math.abs(dp.tx - tx) + Math.abs(dp.ty - ty);
    if (dist < doorDist) { doorDist = dist; nearDoor = dp; }
  }
  if (doorDist > 3) nearDoor = null;
}

var activePopup = null;
function showPopup(msg) {
  if (activePopup) activePopup.remove();
  var pop = document.createElement('div');
  pop.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:auto;';
  pop.innerHTML = '<div style="background:linear-gradient(180deg,#1a1208,#2a1e0e);border-image:linear-gradient(135deg,#8a7a4a,#c8a860,#8a7a4a) 1;border:3px solid;border-radius:2px;box-shadow:0 0 40px rgba(0,0,0,0.9),inset 0 0 60px rgba(0,0,0,0.5);min-width:260px;max-width:85%;position:relative"><div style="margin:3px;background:linear-gradient(180deg,#2a2010,#1a1408);border:1px solid #5a4a2a;padding:20px 24px 16px"><div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#5a4a2a,#c8a860,#5a4a2a);height:3px;width:60%;border-radius:1px;"></div><div style="font-family:monospace;font-size:11px;color:#e0d0b0;text-align:center;line-height:1.7;text-shadow:0 1px 3px rgba(0,0,0,0.6);letter-spacing:0.5px;min-height:50px;">' + msg + '</div><div style="margin-top:14px;padding-top:10px;border-top:1px solid #3a2e18;text-align:center;font-family:monospace;font-size:8px;color:#7a6a4a;letter-spacing:1px"><span style="border:1px solid #5a4a2a;padding:1px 5px;background:rgba(0,0,0,0.3);border-radius:1px;color:#8a7a5a">X</span> close</div></div></div>';
  document.body.appendChild(pop);
  activePopup = pop;
}
function closePopup() { if (activePopup) { activePopup.remove(); activePopup = null; } }

function isWalkable(gx, gy) {
  var tx = Math.floor((gx + 16) / TILE);
  var ty = Math.floor((gy + 14) / TILE);
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return false;
  var v = collisionMap[ty][tx];
  return v === 1 || v === 3 || v === 5 || v === 6;
}

function findNearestWalkable(gx, gy) {
  var tx = Math.floor((gx + 16) / TILE);
  var ty = Math.floor((gy + 14) / TILE);
  for (var r = 0; r < 200; r++) {
    for (var dy = -r; dy <= r; dy++) {
      for (var dx = -r; dx <= r; dx++) {
        if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
        var nx = tx + dx, ny = ty + dy;
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
        var v = collisionMap[ny][nx];
        if (v === 1 || v === 3) {
          return { x: nx * TILE + 4 - 16, y: ny * TILE + 4 - 14 };
        }
      }
    }
  }
  return { x: gx, y: gy };
}

var worldBg = document.getElementById('worldBg');
worldBg.style.width = WORLD_W + 'px';
worldBg.style.height = WORLD_H + 'px';

(function() {
  for (var r = 0; r < 4; r++)
    for (var c = 0; c < 3; c++)
      (new Image()).src = ASSETS + '/sprites/cultist_' + c + '_' + r + '.png';
})();

var viewport = document.getElementById('viewport');
var layer = document.getElementById('gameLayer');

var elP = document.createElement('div');
elP.className = 'sprite';
elP.style.zIndex = '5';
layer.appendChild(elP);

var sparkles = [];
var sparkleSizes = [8,6,9,7,8,10,6,7];
var sparkleRadii = [16,22,14,20,18,12,24,15];
var sparklePhases = [0,2.1,4.2,1.0,3.0,5.1,0.5,3.8];
var sparkleSpeeds = [1,1.2,0.8,1.3,0.9,0.7,1.4,1.1];
var sparkleHues = [0,45,90,135,180,225,270,315];
(function() {
  for (var i = 0; i < 8; i++) {
    var dot = document.createElement('div');
    dot.className = 'sparkle';
    dot.style.cssText = 'position:absolute;width:' + sparkleSizes[i] + 'px;height:' + sparkleSizes[i] + 'px;border-radius:50%;opacity:0;';
    layer.appendChild(dot);
    sparkles.push(dot);
  }
})();

var STEP = 5;
var px = 280, py = 200, pDir = 0, pMoving = false, pWalk = 0;
var nearTrigger = null;

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    window.parent.postMessage({ type: 'hyvmind-close' }, '*');
    return;
  }
  if (e.key.startsWith('Arrow')) {
    e.preventDefault();
    var dir = e.key.slice(5).toLowerCase();
    var btn = document.querySelector('.dpad-btn.dpad-' + dir);
    if (btn) { btn.classList.add('active'); dpadState[dir] = true; }
  }
  if (e.key === 'z' || e.key === 'Z') { document.getElementById('btnZ').classList.add('active'); activateZ(); setTimeout(function() { document.getElementById('btnZ').classList.remove('active'); }, 150); }
  if (e.key === 'x' || e.key === 'X') { document.getElementById('btnX').classList.add('active'); closePopup(); setTimeout(function() { document.getElementById('btnX').classList.remove('active'); }, 150); }
  if (e.key === 'd' || e.key === 'D') debugCollision();
});

function debugCollision() {
  var tx = Math.floor((px + 16) / TILE);
  var ty = Math.floor((py + 14) / TILE);
  console.log('DEBUG: pos=(' + px + ',' + py + ') tile=(' + tx + ',' + ty + ') val=' + collisionMap[ty][tx] + ' nearTrigger=' + (nearTrigger ? nearTrigger.key : 'null') + ' nearDoor=' + (nearDoor ? nearDoor.key + ' label=' + (doorLabels[nearDoor.key] || 'none') : 'null') + ' nearTrigger msg=' + (nearTrigger ? triggerMessages[nearTrigger.key] : 'null') + ' doorLabels keys=' + Object.keys(doorLabels).join(','));
}

function activateZ() {
  var btnZ = document.getElementById('btnZ');
  if (btnZ) btnZ.textContent = '!';
  var msg = '';
  if (nearDoor && doorLabels[nearDoor.key]) {
    window.parent.postMessage({ type: 'hyvmind-nav', target: doorLabels[nearDoor.key] }, '*');
    gamePaused = true;
    msg = 'nav:' + doorLabels[nearDoor.key];
  } else if (nearTrigger && triggerMessages[nearTrigger.key]) {
    showPopup(triggerMessages[nearTrigger.key]);
    msg = 'trigger:' + triggerMessages[nearTrigger.key];
  } else if (nearDoor) {
    showPopup("who am I talking to?");
    msg = 'unlabeled door at ' + nearDoor.key;
  } else {
    showPopup("who am I talking to?");
    msg = 'nothing';
  }
  console.log('Z PRESSED: ' + msg);
  if (btnZ) setTimeout(function() { btnZ.textContent = 'Z'; }, 500);
}

function render() {
  var viewW = SCREEN_W, viewH = SCREEN_H;
  var camX = Math.max(0, Math.min(WORLD_W - viewW, px + 16 - viewW / 2));
  var camY = Math.max(0, Math.min(WORLD_H - viewH, py + 16 - viewH / 2));
  worldBg.style.left = (-camX) + 'px';
  worldBg.style.top = (-camY) + 'px';

  var pc = pMoving ? (Math.floor(pWalk / 2) % 2) : 2;
  var pTileX = Math.floor((px + 16) / TILE);
  var pTileY = Math.floor((py + 14) / TILE);
  var isUnderObject = (pTileX >= 0 && pTileX < COLS && pTileY >= 0 && pTileY < ROWS && collisionMap[pTileY][pTileX] === 5);
  elP.style.cssText = 'position:absolute;left:' + (px - camX) + 'px;top:' + (py - camY) + 'px;width:32px;height:36px;background-image:' + frm(pc, dirMap[pDir]) + ';background-size:32px 36px;image-rendering:pixelated;z-index:5;opacity:' + (isUnderObject ? '0.4' : '1') + ';';

  var t = Date.now() / 300;
  for (var s = 0; s < sparkles.length; s++) {
    if ((nearTrigger && triggerMessages[nearTrigger.key]) || nearDoor) {
      var angle = t * sparkleSpeeds[s] + sparklePhases[s];
      var hue = (sparkleHues[s] + t * 40) % 360;
      sparkles[s].style.left = (px - camX + 16 + Math.cos(angle) * sparkleRadii[s]) + 'px';
      sparkles[s].style.top = (py - camY + 16 + Math.sin(angle) * sparkleRadii[s]) + 'px';
      sparkles[s].style.background = 'hsl(' + hue + ', 100%, 70%)';
      sparkles[s].style.boxShadow = '0 0 ' + (sparkleSizes[s] + 4) + 'px hsl(' + hue + ', 100%, 55%)';
      sparkles[s].style.opacity = 0.7 + 0.3 * Math.sin(angle * 2.5);
    } else {
      sparkles[s].style.opacity = 0;
    }
  }
}

document.addEventListener('keyup', function(e) {
  if (e.key.startsWith('Arrow')) {
    var dir = e.key.slice(5).toLowerCase();
    var btn = document.querySelector('.dpad-btn.dpad-' + dir);
    if (btn) { btn.classList.remove('active'); dpadState[dir] = false; }
  }
});

var dpadState = {};
document.querySelectorAll('.dpad-btn').forEach(function(btn) {
  function start(e) { e.preventDefault(); btn.classList.add('active'); dpadState[btn.dataset.dir] = true; }
  function end(e) { e.preventDefault(); btn.classList.remove('active'); dpadState[btn.dataset.dir] = false; }
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
  btn.addEventListener('mouseleave', end);
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('touchend', end, { passive: false });
  btn.addEventListener('touchcancel', end, { passive: false });
});

document.getElementById('btnZ').addEventListener('click', function() {
  this.classList.add('active');
  activateZ();
  setTimeout(function() { this.classList.remove('active'); }.bind(this), 150);
});
document.getElementById('btnX').addEventListener('click', function() {
  this.classList.add('active');
  closePopup();
  setTimeout(function() { this.classList.remove('active'); }.bind(this), 150);
});

var tick = 0;
function loop() {
  if (gamePaused) { render(); return; }
  tick++;
  var dx = 0, dy = 0;
  if (dpadState['left']) { dx = -STEP; pDir = 1; }
  else if (dpadState['right']) { dx = STEP; pDir = 2; }
  else if (dpadState['up']) { dy = -STEP; pDir = 3; }
  else if (dpadState['down']) { dy = STEP; pDir = 0; }

  if (dx !== 0 || dy !== 0) {
    var nx = px + dx, ny = py + dy;
    if (dx !== 0 && isWalkable(nx, py)) px = nx;
    if (dy !== 0 && isWalkable(px, ny)) py = ny;
    pMoving = true;
    if (tick % 2 === 0) pWalk++;
  } else { pMoving = false; pWalk = 0; }
  px = Math.max(0, Math.min(WORLD_W - 32, px));
  py = Math.max(0, Math.min(WORLD_H - 32, py));
  checkNearbyTriggers(px, py);
  render();
}

var bgm = document.getElementById('bgm');
var bgmStarted = false;
function startBGM() {
  if (bgmStarted) return;
  bgmStarted = true;
  bgm.volume = 0.35;
  bgm.play().catch(function(){});
  document.removeEventListener('keydown', startBGM);
  document.removeEventListener('click', startBGM);
}
document.addEventListener('keydown', startBGM);
document.addEventListener('click', startBGM);

initCollision(function() {
  loadTriggers(function() {
    if (!isWalkable(px, py)) {
      var n = findNearestWalkable(px, py);
      px = n.x; py = n.y;
      if (!isWalkable(px, py)) {
        for (var yy = -16; yy <= 16; yy += 8)
          for (var xx = -16; xx <= 16; xx += 8)
            if (isWalkable(280 + xx, 200 + yy)) { px = 280 + xx; py = 200 + yy; yy = 999; break; }
      }
    }
    render();
    setInterval(loop, 40);
    document.body.focus();
    console.log('HYVMIND DEBUG: triggers=' + triggerPositions.length + ' doors=' + doorPositions.length + ' triggerMessages=' + Object.keys(triggerMessages).length + ' doorLabels=' + Object.keys(doorLabels).length + ' nearTrigger=' + (nearTrigger ? nearTrigger.key : 'null'));
  });
});
</script>
