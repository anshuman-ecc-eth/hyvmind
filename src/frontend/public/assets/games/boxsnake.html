<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,height=device-height,user-scalable=no,initial-scale=1,maximum-scale=1"/>
<script src="lib/algo-chip.umd.js"></script>
<script src="lib/algo-chip-util.umd.js"></script>
<script src="lib/pixi.min.js"></script>
<script src="lib/pixi-filters.js"></script>
<script src="lib/lodash.clonedeep.js"></script>
<script src="lib/bundle.js"></script>
<script>
(function() {
  var origEnd = window.end;
  window.end = function() {
    window.parent.postMessage({ type: "crisp-game-over", score: window.score || 0 }, "*");
    origEnd.apply(this, arguments);
  };
})();
</script>
<script src="boxsnake.js"></script>
<script>
window.addEventListener("load", function() { window.onLoad(); });
</script>
<script>
window.addEventListener("keydown", function(e) {
  if (e.key === "Escape" || e.key === "x" || e.key === "X") {
    window.parent.postMessage({ type: "hyvmind-game-exit" }, "*");
  }
});
</script>
</head>
<body style="background:transparent"></body>
</html>
